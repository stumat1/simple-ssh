<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- App loads only local content. Tight CSP; 'unsafe-inline' style is needed
         by xterm.js (inline style attributes) and Vite; 'ws:' allows dev HMR. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' ws:"
    />
    <title>Simple SSH</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <!-- Tab bar: tab buttons are inserted before the "+" button. -->
      <div id="tabbar" role="tablist">
        <button id="new-tab" class="new-tab" title="New tab">+</button>
      </div>
      <!-- Tab panes are created dynamically by the renderer. -->
      <div id="content"></div>
      <footer class="statusbar">
        <span id="status">No tabs</span>
        <span class="statusbar-controls">
          <button id="font-dec" class="sb-btn" title="Decrease font size (Ctrl+-)">A−</button>
          <span id="font-size" class="sb-readout" title="Terminal font size">14</span>
          <button id="font-inc" class="sb-btn" title="Increase font size (Ctrl+=)">A+</button>
          <button id="recents-open" class="sb-btn" title="Recent connections">◷</button>
          <button id="theme-toggle" class="sb-btn" title="Toggle light/dark theme">◐</button>
          <button id="forwards-open" class="sb-btn" title="Port forwarding (active tab)">⇄</button>
          <button id="settings-open" class="sb-btn" title="Terminal settings">⚙</button>
          <span id="version"></span>
        </span>
      </footer>

      <!-- Host-key trust prompt: app-level singleton modal, shown during a handshake. -->
      <div id="hostkey-view" class="overlay hidden">
        <div class="card">
          <h2 id="hostkey-title">Unknown host key</h2>
          <p class="hk-line">Server: <span id="hostkey-host"></span></p>
          <p class="hk-line">Fingerprint: <code id="hostkey-fp"></code></p>
          <p class="hk-line hidden" id="hostkey-known-line">
            Previously trusted: <code id="hostkey-known"></code>
          </p>
          <p class="error" id="hostkey-warning"></p>
          <div class="card-actions">
            <button type="button" id="hostkey-cancel" class="btn-secondary">Cancel</button>
            <button type="button" id="hostkey-accept">Trust &amp; Continue</button>
          </div>
        </div>
      </div>
      <!-- Keyboard-interactive (MFA/OTP) challenge: app-level singleton modal. -->
      <div id="kbd-view" class="overlay hidden">
        <form class="card" id="kbd-form">
          <h2 id="kbd-title">Authentication required</h2>
          <p class="hint hidden" id="kbd-instructions"></p>
          <div id="kbd-fields"></div>
          <div class="card-actions">
            <button type="button" id="kbd-cancel" class="btn-secondary">Cancel</button>
            <button type="submit" id="kbd-submit">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
