# electron-builder configuration — Windows NSIS installer.
# Build with:  npm run package   (runs electron-vite build, then packs out/ + resources/)

appId: com.simplessh.app
productName: Simple SSH
copyright: Copyright © 2026

directories:
  # Installer + unpacked app are written here (gitignored).
  output: dist
  # buildResources defaults to ./build; we point the icon at resources/ instead.

# What goes inside the app (asar). Defaults to everything; we keep `out/**`,
# `resources/**`, `package.json`, and production node_modules, and strip the rest.
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!.claude/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!eslint.config.mjs'
  - '!{.eslintignore,.prettierignore,.prettierrc,.prettierrc.json,.prettierrc.yaml}'
  - '!{.env,.env.*,.npmrc,package-lock.json,pnpm-lock.yaml,yarn.lock}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{sshinitialplan.md,sshinitialplan2.md,*.md}'
  # ssh2's optional native accelerator. It needs a toolchain to build and ssh2
  # falls back to pure JS without it — drop it so the build is self-contained.
  - '!node_modules/cpu-features/**'
  - '!node_modules/nan/**'

# Runtime assets referenced via __dirname (e.g. the window icon) must be real
# files on disk, so keep resources/ out of the asar archive.
asarUnpack:
  - resources/**

# Don't recompile native modules against Electron's ABI. We ship no native code
# (cpu-features is excluded above), so a rebuild would only add a toolchain
# dependency and a chance to fail.
npmRebuild: false

win:
  # electron-builder generates the multi-resolution .ico from this 512² PNG.
  icon: resources/icon.png
  executableName: simple-ssh
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}

  # --- Code signing (currently OFF → unsigned dev build; SmartScreen warns) ---
  # Enable exactly ONE of the following when the cert is ready (see PACKAGING.md):
  #
  # A) SSL.com .pfx file — no config needed here; just set env vars before build:
  #      CSC_LINK=path\to\cert.pfx   CSC_KEY_PASSWORD=********
  #
  # B) SSL.com eSigner cloud (CodeSignTool) — uncomment the hook, set ES_* env:
  #      sign: ./sign.cjs
  #
  # C) Hardware token (YubiKey/eToken) — the cert is in the Windows store; sign
  #    interactively (PIN). Uncomment and set to your cert's subject name:
  #      certificateSubjectName: "Your Organization, Inc."

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Simple SSH
  uninstallDisplayName: Simple SSH ${version}
  artifactName: ${productName}-${version}-setup.${ext}
